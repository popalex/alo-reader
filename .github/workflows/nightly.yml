name: Nightly

# The heavy full-stack gates (a compose stack + a real browser), too slow for
# every PR. They run on a nightly schedule and on demand from the Actions tab.
on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch: {} # on-demand ("Run workflow" button)

# A manual run supersedes an in-flight one; never cancel the scheduled run.
concurrency:
  group: nightly-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  e2e:
    # make e2e: build+run the compose stack (AUTH_MODE=none) with the fixture
    # feed, seed data, and drive the Caddy-served SPA with Playwright.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
        with:
          version: "11"
      - run: pnpm -C web install
      - name: Install Playwright Chromium
        run: pnpm -C web exec playwright install --with-deps chromium
      - name: make e2e
        run: make e2e

  lighthouse:
    # make lighthouse: serve the build via Caddy and gate performance >= 90.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
        with:
          version: "11"
      - run: pnpm -C web install
      - name: Install Chromium for Lighthouse
        # Populates ~/.cache/ms-playwright so lighthouse.sh finds a Chrome.
        run: pnpm -C web exec playwright install --with-deps chromium
      - name: make lighthouse
        run: make lighthouse

  bench-search:
    # Search p95 budget (< 100 ms) at full 5M-entry scale (DESIGN §4.1.6). Too slow
    # to seed per-PR; the 100k profile gates PRs in ci.yml.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: alo
          POSTGRES_PASSWORD: alo
          POSTGRES_DB: alo
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U alo -d alo"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://alo:alo@localhost:5432/alo
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./api[dev]"
      - name: Migrate
        run: cd api && alembic upgrade head
      - name: Benchmark (5M profile)
        run: BENCH_PROFILE=nightly python scripts/bench_search.py
