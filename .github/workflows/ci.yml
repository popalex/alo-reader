name: CI

# Feature branches run once, via pull_request (which tests the simulated merge
# with main); push only fires for main itself (post-merge). This avoids the
# double run you'd get from push + pull_request both matching a PR branch.
on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref cancels an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./api[dev]"
      - run: ruff check api
      - run: ruff format --check api

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./api[dev]"
      - run: mypy api
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
        with:
          version: "11"
      - run: pnpm -C web install
      - run: pnpm -C web tsc
      - run: pnpm -C web lint

  test-api:
    # Tests provision their own throwaway Postgres via Testcontainers (Docker is
    # available on the runner) — no service container needed. The whole suite
    # must be green under both AUTH_MODE values (WP-02 acceptance).
    runs-on: ubuntu-latest
    strategy:
      matrix:
        auth_mode: [clerk, none]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./api[dev]"
      # Migration 0003 needs the rum extension, so the Testcontainers Postgres
      # is our postgres:18+rum image (conftest defaults to alo-reader-postgres:local).
      - name: Build Postgres image (rum)
        run: docker build -f deploy/Dockerfile.postgres -t alo-reader-postgres:local deploy
      - run: pytest api
        env:
          AUTH_MODE: ${{ matrix.auth_mode }}

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
        with:
          version: "11"
      - run: pnpm -C web install
      - run: pnpm -C web test

  bundle-size:
    # The SPA's initial JS+CSS must stay within the gz budget (DESIGN.md §1.2).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
        with:
          version: "11"
      - run: pnpm -C web install
      - run: pnpm -C web build
      - run: pnpm -C web size

  client-drift:
    # The typed client is generated from the API's OpenAPI schema; regenerate it
    # and fail if the committed output is stale (SPA <-> API contract drift).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./api[dev]"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v6
        with:
          version: "11"
      - run: pnpm -C web install
      - name: Regenerate typed client
        run: |
          cd api && AUTH_MODE=none python -c "import json,sys; from app.main import app; json.dump(app.openapi(), sys.stdout, sort_keys=True)" > ../web/openapi.json
          cd ../web && pnpm exec openapi-typescript openapi.json -o src/api/schema.d.ts
      - name: Fail on drift
        run: git diff --exit-code -- web/src/api/schema.d.ts

  bench-search:
    # Search p95 budget (< 100 ms) on the per-PR 100k-entry profile (DESIGN §4.1.6).
    # The 5M nightly profile runs in nightly.yml. Postgres must be our postgres:18
    # + rum image (built here, since GitHub service containers can't build), so it's
    # run as a plain container rather than a `services:` entry.
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://alo:alo@localhost:5432/alo
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./api[dev]"
      - name: Build + start Postgres (rum)
        run: |
          docker build -f deploy/Dockerfile.postgres -t alo-reader-postgres:local deploy
          docker run -d --name pg -e POSTGRES_USER=alo -e POSTGRES_PASSWORD=alo \
            -e POSTGRES_DB=alo -p 5432:5432 alo-reader-postgres:local
          for i in $(seq 1 30); do docker exec pg pg_isready -U alo -d alo && break; sleep 2; done
      - name: Migrate
        run: cd api && alembic upgrade head
      - name: Benchmark (100k profile)
        run: BENCH_PROFILE=pr python scripts/bench_search.py

  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker build -f deploy/Dockerfile.api -t alo-reader-api .
      - run: docker build -f deploy/Dockerfile.caddy -t alo-reader-caddy .
      - run: docker build -f deploy/Dockerfile.postgres -t alo-reader-postgres deploy
