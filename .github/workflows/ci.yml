name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./api[dev]"
      - run: ruff check api
      - run: ruff format --check api

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./api[dev]"
      - run: mypy api
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
        with:
          version: "11"
      - run: pnpm -C web install
      - run: pnpm -C web tsc

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alo
          POSTGRES_PASSWORD: alo
          POSTGRES_DB: alo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alo -d alo"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://alo:alo@localhost:5432/alo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e "./api[dev]"
      - run: pytest api

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v4
        with:
          version: "11"
      - run: pnpm -C web install
      - run: pnpm -C web test

  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deploy/Dockerfile.api -t alo-reader-api .
      - run: docker build -f deploy/Dockerfile.caddy -t alo-reader-caddy .
