# Dev overlay: hot-reload both sides, disposable Postgres.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up  (`make dev`)

services:
  caddy:
    # No frontend build in dev — plain Caddy proxying to the Vite dev server.
    build: !reset null
    image: caddy:2-alpine
    # Dev is served on http://localhost:3000 (prod uses :80). Caddy listens on
    # :3000 in dev (see Caddyfile.dev). !override replaces the base 80:80 mapping.
    ports: !override
      - "3000:3000"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - web

  # Mount source so a newly-added migration is applied on the next `make dev`
  # without rebuilding the image.
  migrate:
    volumes:
      - ../api:/app

  api:
    # Bypass the image entrypoint (api/worker dispatch) to run uvicorn with reload.
    entrypoint: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    command: !reset null
    environment:
      # Dev is explicitly local: default to single-user no-auth mode.
      AUTH_MODE: ${AUTH_MODE:-none}
    volumes:
      - ../api:/app

  web:
    image: node:24-slim
    working_dir: /web
    # CI=true makes pnpm non-interactive (no purge prompt).
    environment:
      CI: "true"
    # pnpm installs node_modules INSIDE the container: node_modules lives in the
    # web_node_modules volume and the content store in the pnpm_store volume (via
    # --store-dir). The host's ./web is bind-mounted for source only — its
    # node_modules and any store are shadowed by volumes and never written.
    command: sh -c "corepack enable && pnpm install --store-dir /pnpm-store && pnpm dev --host"
    volumes:
      - ../web:/web
      - web_node_modules:/web/node_modules
      - pnpm_store:/pnpm-store
    expose:
      - "5173"

  postgres:
    # Disposable: no named volume, data lives only for the container's lifetime.
    volumes: !reset []
    # Expose on localhost only so host-run alembic/pytest (in .venv) can connect.
    # Postgres is never installed on the host — this is just the container's port.
    ports:
      - "127.0.0.1:5432:5432"

volumes:
  web_node_modules:
  pnpm_store:
