# Base stack: dev = prod topology. Run from the repo root via `make up`.
# Reads variables from the repo-root .env (see .env.example).

services:
  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: ["api"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://alo:alo@postgres:5432/alo}
      # No default on purpose: the API refuses to boot without an explicit
      # AUTH_MODE (set it in .env; see .env.example). Dev overlay sets "none".
      AUTH_MODE: ${AUTH_MODE:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_AUDIENCE: ${CLERK_AUDIENCE:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      RATE_LIMIT_RPS: ${RATE_LIMIT_RPS:-10}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-30}
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: ["worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://alo:alo@postgres:5432/alo}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alo}
      POSTGRES_DB: ${POSTGRES_DB:-alo}
    volumes:
      # postgres:18+ images require the mount at /var/lib/postgresql (data lives
      # in a version-specific subdir); mounting .../data is refused at boot.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alo} -d ${POSTGRES_DB:-alo}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
