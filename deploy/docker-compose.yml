# Base stack: dev = prod topology. Run from the repo root via `make up`.
# Reads variables from the repo-root .env (see .env.example).

services:
  caddy:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.caddy
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: ["api"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://alo:alo@postgres:5432/alo}
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    command: ["worker"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://alo:alo@postgres:5432/alo}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alo}
      POSTGRES_DB: ${POSTGRES_DB:-alo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alo} -d ${POSTGRES_DB:-alo}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
