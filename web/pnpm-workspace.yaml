# pnpm 11 reads settings from here (no longer from the package.json "pnpm" field).
# Allow esbuild (a vite/vitest dependency) to run its install script, and skip the
# sync install check that pnpm otherwise runs before every `pnpm run` script.
allowBuilds:
  '@clerk/shared': true
  esbuild: true
verifyDepsBeforeRun: false
# `pnpm audit` (CI security gate, WP-15) ignores advisories with no fix available to
# us yet, so the gate stays meaningful for actionable ones. Revisit on each bump.
#   GHSA-w24r-5266-9c3c — @clerk/clerk-react; "patched" 5.61.6 is unpublished
#     (latest is 5.61.3), so there is nothing to upgrade to. Drop when Clerk ships it.
auditConfig:
  ignoreGhsas:
    - GHSA-w24r-5266-9c3c
